version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Pre-build phase started"
    build:
      commands:
        - |
          echo "window.APP_CONFIG = {
            API_ENDPOINT: '${API_ENDPOINT}',
            API_KEY: '${API_KEY}',
            REGION: '${REGION}',
            DEBUG_MODE: '${DEBUG_MODE}'
          };"
  artifacts:
    baseDirectory: frontend
    files:
      - '**/*'
  cache:
    paths: []
