version: 1
frontend:
  phases:
    build:
      commands:
        - echo "Generating app.js"
        - |
          cat > frontend/app.js << EOF
          window.APP_CONFIG = {
            API_ENDPOINT: "${API_ENDPOINT}",
            API_KEY: "${API_KEY}",
            REGION: "${REGION}",
            DEBUG_MODE: "${DEBUG_MODE}"
          };
          EOF
        - cat frontend/index.html
  artifacts:
    baseDirectory: frontend
    files:
      - '**/*'
