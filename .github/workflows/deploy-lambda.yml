name: Test AWS Credentials

on:
  workflow_dispatch:

jobs:
  test-credentials:
    runs-on: ubuntu-latest

    steps:
      - name: Check whether secrets are readable
        env:
          AK: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SK: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$AK" ]; then
            echo "::error::AWS_ACCESS_KEY_ID tidak terbaca atau kosong"
            exit 1
          fi

          if [ -z "$SK" ]; then
            echo "::error::AWS_SECRET_ACCESS_KEY tidak terbaca atau kosong"
            exit 1
          fi

          echo "Secrets terbaca oleh workflow"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Validate AWS identity
        run: aws sts get-caller-identity
